services:
  postgres:
    image: postgres:15-alpine
    container_name: deployhub-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: deployhub
      POSTGRES_PASSWORD: deployhub
      POSTGRES_DB: deployhub
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: deployhub-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
